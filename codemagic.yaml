workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 90
    integrations:
      app_store_connect: "Fit Check"
    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "app.replit.liveedgeengine"
        XCODE_PROJECT_DIR: "artifacts/mobile/ios"
        # API host that the TestFlight build will call. EXPO_PUBLIC_* vars
        # are inlined into the JS bundle at build time by Metro/Expo, so this
        # MUST be set before the "Pre-bundle JS" step runs. Override in the
        # Codemagic UI (Environment variables) to point at the production
        # *.replit.app deployment once it's live.
        EXPO_PUBLIC_DOMAIN: "06535027-33d0-43ef-949a-3c10766c0a6d-00-17wupj1hp4kia.janeway.replit.dev"
    scripts:
      - name: Enable pnpm via corepack
        script: |
          corepack enable
          corepack prepare pnpm@10.26.1 --activate
          pnpm --version

      - name: Install mobile dependencies
        script: |
          pnpm install --filter "@workspace/mobile..." --frozen-lockfile

      - name: Generate native iOS project (expo prebuild)
        script: |
          cd artifacts/mobile
          npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        script: |
          cd artifacts/mobile/ios
          pod install

      - name: Generate signing certificate private key
        script: |
          ssh-keygen -t rsa -b 2048 -m PEM -f /tmp/apple_cert.key -q -N ""

      - name: Revoke stale Live Edge certs (preserve in-review app cert)
        script: |
          # SAFETY: another app is currently in App Store review. Its cert
          # expires 2027-04-30 and MUST be preserved. We only revoke certs
          # NOT matching that expiration date, which by definition are stale
          # leftovers from earlier failed Live Edge builds.
          PROTECTED_EXPIRATION="2027-04-30"
          echo "Protecting any cert with expirationDate starting with: $PROTECTED_EXPIRATION"
          echo ""
          echo "--- All current DISTRIBUTION + IOS_DISTRIBUTION certs ---"
          for CERT_TYPE in DISTRIBUTION IOS_DISTRIBUTION; do
            app-store-connect certificates list --type "$CERT_TYPE" --json 2>/dev/null \
              | jq -r --arg t "$CERT_TYPE" '.[] | "[\($t)] id=\(.id) name=\(.attributes.name) exp=\(.attributes.expirationDate)"' || true
          done
          echo ""
          echo "--- Revoking stale certs ---"
          for CERT_TYPE in DISTRIBUTION IOS_DISTRIBUTION; do
            STALE_IDS=$(app-store-connect certificates list --type "$CERT_TYPE" --json 2>/dev/null \
              | jq -r --arg keep "$PROTECTED_EXPIRATION" \
                  '.[] | select(.attributes.expirationDate | startswith($keep) | not) | .id' || true)
            for ID in $STALE_IDS; do
              echo "Revoking stale $CERT_TYPE cert: $ID"
              app-store-connect certificates delete "$ID" --ignore-not-found || true
            done
          done
          echo ""
          echo "--- Remaining certs after revocation (in-review app's cert should still be here) ---"
          for CERT_TYPE in DISTRIBUTION IOS_DISTRIBUTION; do
            app-store-connect certificates list --type "$CERT_TYPE" --json 2>/dev/null \
              | jq -r --arg t "$CERT_TYPE" '.[] | "[\($t)] id=\(.id) exp=\(.attributes.expirationDate)"' || true
          done

      - name: Fetch / create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/apple_cert.key \
            --create

      - name: Initialize keychain
        script: |
          keychain initialize
          keychain add-certificates

      - name: Set up code signing
        script: |
          cd artifacts/mobile/ios
          xcode-project use-profiles

      - name: Set unique build number
        script: |
          # Use Codemagic's per-workflow $BUILD_NUMBER (monotonically
          # increases on every build attempt, never reuses) plus a +100
          # offset to safely skip past any builds already uploaded to
          # App Store Connect during prior manual experiments.
          # This guarantees a unique CFBundleVersion every run, avoiding
          # Apple's "attribute value already used" error on upload.
          set -e
          NEW_BUILD_NUMBER=$(($BUILD_NUMBER + 100))
          echo "Codemagic BUILD_NUMBER=$BUILD_NUMBER  ->  setting CFBundleVersion=$NEW_BUILD_NUMBER"

          cd artifacts/mobile/ios
          # agvtool requires running from the dir containing the .xcodeproj
          agvtool new-version -all "$NEW_BUILD_NUMBER"

          # Verify the change actually landed in Info.plist — if it didn't,
          # fail loudly here rather than at the upload step 5 minutes later.
          PLIST="LiveEdgeEngine/Info.plist"
          if [ ! -f "$PLIST" ]; then
            PLIST=$(find . -maxdepth 3 -name Info.plist -not -path "*/Pods/*" | head -1)
          fi
          echo "Info.plist path: $PLIST"
          ACTUAL=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")
          echo "CFBundleVersion now: $ACTUAL"
          if [ "$ACTUAL" != "$NEW_BUILD_NUMBER" ]; then
            echo "ERROR: agvtool did not update CFBundleVersion. Forcing via PlistBuddy."
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW_BUILD_NUMBER" "$PLIST"
            ACTUAL=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST")
            echo "CFBundleVersion after PlistBuddy: $ACTUAL"
          fi

      - name: Pre-bundle JS (surface Metro errors clearly)
        script: |
          # Runs Metro standalone so any error (missing module, syntax, etc.)
          # appears in this short log rather than buried inside the Xcode log.
          set -e
          cd artifacts/mobile
          ENTRY="$(pwd)/node_modules/expo-router/entry.js"
          echo "Resolved entry file: $ENTRY"
          if [ ! -f "$ENTRY" ]; then
            echo "ERROR: entry file missing. Listing artifacts/mobile/node_modules/expo-router/:"
            ls -la "$(pwd)/node_modules/expo-router/" || echo "  expo-router dir not found"
            echo ""
            echo "Listing artifacts/mobile/node_modules (top level):"
            ls "$(pwd)/node_modules/" | head -40
            exit 1
          fi
          mkdir -p /tmp/expo-bundle-debug
          npx expo export:embed \
            --platform ios \
            --dev false \
            --entry-file "$ENTRY" \
            --bundle-output /tmp/expo-bundle-debug/main.jsbundle \
            --assets-dest /tmp/expo-bundle-debug/assets

      - name: Build iOS .ipa
        script: |
          cd artifacts/mobile/ios
          WORKSPACE=$(ls -d *.xcworkspace | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"
          cd ../../..
          xcode-project build-ipa \
            --workspace "artifacts/mobile/ios/$WORKSPACE" \
            --scheme "$SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
