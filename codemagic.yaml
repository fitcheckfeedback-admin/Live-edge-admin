workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 90
    integrations:
      app_store_connect: "Fit Check"
    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "app.replit.liveedgeengine"
        XCODE_PROJECT_DIR: "artifacts/mobile/ios"
    scripts:
      - name: Enable pnpm via corepack
        script: |
          corepack enable
          corepack prepare pnpm@10.26.1 --activate
          pnpm --version

      - name: Install mobile dependencies
        script: |
          pnpm install --filter "@workspace/mobile..." --frozen-lockfile

      - name: Generate native iOS project (expo prebuild)
        script: |
          cd artifacts/mobile
          npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        script: |
          cd artifacts/mobile/ios
          pod install

      - name: Generate signing certificate private key
        script: |
          ssh-keygen -t rsa -b 2048 -m PEM -f /tmp/apple_cert.key -q -N ""

      - name: Revoke existing distribution certificates
        script: |
          # Apple allows only 1 active distribution cert (combined across
          # IOS_DISTRIBUTION + DISTRIBUTION/Apple Distribution types).
          # Revoke ALL of them so fetch-signing-files can create a fresh one
          # tied to the private key we just generated.
          for CERT_TYPE in IOS_DISTRIBUTION DISTRIBUTION; do
            echo "--- Checking certificates of type: $CERT_TYPE ---"
            CERT_IDS=$(app-store-connect certificates list \
              --type "$CERT_TYPE" \
              --json 2>/dev/null | jq -r '.[].id' || true)
            if [ -z "$CERT_IDS" ]; then
              echo "No $CERT_TYPE certificates to revoke."
            else
              for ID in $CERT_IDS; do
                echo "Revoking $CERT_TYPE certificate $ID"
                app-store-connect certificates delete "$ID" --ignore-not-found || true
              done
            fi
          done
          echo "--- Remaining distribution certs after revocation ---"
          app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>/dev/null | jq -r '.[] | "IOS_DIST: \(.id)"' || true
          app-store-connect certificates list --type DISTRIBUTION --json 2>/dev/null | jq -r '.[] | "DIST:     \(.id)"' || true

      - name: Fetch / create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/apple_cert.key \
            --create

      - name: Initialize keychain
        script: |
          keychain initialize
          keychain add-certificates

      - name: Set up code signing
        script: |
          cd artifacts/mobile/ios
          xcode-project use-profiles

      - name: Increment build number
        script: |
          cd artifacts/mobile/ios
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          NEW_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 1))
          echo "Setting build number to $NEW_BUILD_NUMBER"
          agvtool new-version -all $NEW_BUILD_NUMBER

      - name: Build iOS .ipa
        script: |
          cd artifacts/mobile/ios
          WORKSPACE=$(ls -d *.xcworkspace | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"
          cd ../../..
          xcode-project build-ipa \
            --workspace "artifacts/mobile/ios/$WORKSPACE" \
            --scheme "$SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
