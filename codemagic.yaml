workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 90
    integrations:
      app_store_connect: "Fit Check"
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.replit.liveedgeengine
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "app.replit.liveedgeengine"
        XCODE_PROJECT_DIR: "artifacts/mobile/ios"
    scripts:
      - name: Enable pnpm via corepack
        script: |
          corepack enable
          corepack prepare pnpm@10.26.1 --activate
          pnpm --version

      - name: Install mobile dependencies
        script: |
          pnpm install --filter "@workspace/mobile..." --frozen-lockfile

      - name: Generate native iOS project (expo prebuild)
        script: |
          cd artifacts/mobile
          npx expo prebuild --platform ios --no-install --clean

      - name: Install CocoaPods
        script: |
          cd artifacts/mobile/ios
          pod install

      - name: Fetch / create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Initialize keychain
        script: |
          keychain initialize
          keychain add-certificates

      - name: Set up code signing
        script: |
          cd artifacts/mobile/ios
          xcode-project use-profiles

      - name: Increment build number
        script: |
          cd artifacts/mobile/ios
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          NEW_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 1))
          echo "Setting build number to $NEW_BUILD_NUMBER"
          agvtool new-version -all $NEW_BUILD_NUMBER

      - name: Build iOS .ipa
        script: |
          cd artifacts/mobile/ios
          WORKSPACE=$(ls -d *.xcworkspace | head -n1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Using workspace: $WORKSPACE, scheme: $SCHEME"
          cd ../../..
          xcode-project build-ipa \
            --workspace "artifacts/mobile/ios/$WORKSPACE" \
            --scheme "$SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
