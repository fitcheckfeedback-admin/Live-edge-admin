workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 90
    integrations:
      app_store_connect: Fit Check
    environment:
      node: 20.11.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.liveedge.engine"
      groups:
        - app_store_credentials
    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@9

      - name: Install workspace dependencies
        script: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        script: npm install -g eas-cli

      - name: Build iOS app via EAS
        script: |
          cd artifacts/mobile
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --no-wait=false \
            --output ../../ios-build.ipa

    artifacts:
      - ios-build.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
