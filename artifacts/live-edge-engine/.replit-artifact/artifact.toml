kind = "web"
previewPath = "/"
title = "Live Edge Engine"
version = "1.0.0"
id = "artifacts/live-edge-engine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18218

[services.development]
run = "pnpm --filter @workspace/live-edge-engine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/live-edge-engine", "run", "build" ]
publicDir = "artifacts/live-edge-engine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18218"
BASE_PATH = "/"
